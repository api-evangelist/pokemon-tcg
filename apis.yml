apis:
- aid: pokemon-tcg:pokemon-tcg-cards-api
  name: Pokémon TCG Cards API
  tags:
  - Pokemon
  - Cards
  - Trading Cards
  - Card Prices
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.pokemontcg.io/api-reference/cards/search-cards
  baseURL: https://api.pokemontcg.io/v2
  properties:
  - url: https://docs.pokemontcg.io/api-reference/cards/card-object
    type: Documentation
  - url: https://docs.pokemontcg.io/api-reference/cards/search-cards
    type: APIReference
  - url: openapi/pokemon-tcg-openapi.yml
    type: OpenAPI
  description: Search and retrieve individual Pokémon, Trainer, and Energy
    cards. Each card includes gameplay data (HP, attacks, abilities,
    weaknesses, resistances, retreat cost), rarity, artist, flavor text,
    National Pokédex numbers, format legalities, small and hi-res card images,
    and daily-updated TCGplayer and Cardmarket prices. Supports Lucene-like
    queries, ordering, field selection, and pagination up to 250 cards per page.
- aid: pokemon-tcg:pokemon-tcg-sets-api
  name: Pokémon TCG Sets API
  tags:
  - Pokemon
  - Sets
  - Expansions
  - TCG
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.pokemontcg.io/api-reference/sets/search-sets
  baseURL: https://api.pokemontcg.io/v2
  properties:
  - url: https://docs.pokemontcg.io/api-reference/sets/set-object
    type: Documentation
  - url: https://docs.pokemontcg.io/api-reference/sets/search-sets
    type: APIReference
  - url: openapi/pokemon-tcg-openapi.yml
    type: OpenAPI
  description: Search and retrieve trading card game sets (expansions) - Base
    Set through the latest series - with printed and total card counts, series
    grouping, release dates, Pokémon TCG Online/Live codes, format legalities,
    and set symbol and logo images. Uses the same query, ordering, selection,
    and pagination parameters as the Cards API.
- aid: pokemon-tcg:pokemon-tcg-metadata-api
  name: Pokémon TCG Metadata API
  tags:
  - Pokemon
  - Types
  - Rarities
  - Reference Data
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.pokemontcg.io/api-reference/types/get-types
  baseURL: https://api.pokemontcg.io/v2
  properties:
  - url: https://docs.pokemontcg.io/api-reference/types/get-types
    type: Documentation
  - url: https://docs.pokemontcg.io/api-reference/rarities/get-rarities
    type: APIReference
  - url: openapi/pokemon-tcg-openapi.yml
    type: OpenAPI
  description: The controlled vocabularies used across the card catalog - the
    eleven energy types (Fire, Water, Grass, Lightning, and the rest), forty
    card subtypes (Basic, Stage 1, EX, GX, V, VMAX, TAG TEAM, Item, Supporter,
    Stadium, and more), the three supertypes (Energy, Pokémon, Trainer), and
    all card rarities. Useful for building search filters and validating
    queries against the Cards and Sets APIs.
