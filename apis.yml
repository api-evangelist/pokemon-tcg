aid: pokemon-tcg
url: https://raw.githubusercontent.com/api-evangelist/pokemon-tcg/refs/heads/main/apis.yml
name: Pokémon TCG API
kind: organization
description: The Pokémon TCG API is a free, community-run REST API created and
  maintained by Andrew Backes that serves Pokémon Trading Card Game data - more
  than 20,000 cards across 170+ sets, from Base Set onward. Every card carries
  full gameplay data (attacks, abilities, weaknesses, resistances, retreat
  costs), format legalities, high-resolution card images, and daily-updated
  market prices from TCGplayer and Cardmarket. A Lucene-like query syntax
  supports keyword, phrase, wildcard, exact, range, and nested-field searches
  across every field. The API works without authentication at a reduced rate
  limit; a free API key from the developer portal, sent in the X-Api-Key
  header, raises the limits. Official SDKs cover Python, Ruby, JavaScript,
  TypeScript, C#, Kotlin, PHP, Go, Dart, and Elixir.
