description: >-
  FinOps view of Pokémon TCG API consumption. There is no vendor invoice at
  any usage level - the API is a free, community-run service funded by
  voluntary Patreon and Ko-fi donations. The only unit that matters for cost
  governance is the request quota: 1,000 requests/day anonymously (max
  30/minute) or 20,000 requests/day with a free API key, with higher limits
  negotiable with the maintainer. For consumers, the FinOps concern is quota
  stewardship (staying inside daily limits so integrations do not break) and
  any optional recurring donation a team chooses to make to support the
  service they depend on.
notes: >-
  Because there is no billing, no FOCUS-format billing export exists or will
  exist. Treat the daily request quota as the budget: meter requests per
  application, cache card and set data locally (card data changes rarely;
  prices update daily), and consider a modest recurring donation as a line
  item if the API is in a production dependency path.
