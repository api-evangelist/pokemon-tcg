meters:
- name: api_requests
  description: HTTP requests against api.pokemontcg.io/v2, counted against the daily quota (1,000/day anonymous, 20,000/day keyed).
  unit: requests
  aggregation: sum
  dimensions:
  - api-key
  - application
  - endpoint
- name: anonymous_burst
  description: Per-minute request rate for keyless clients, capped at 30/minute.
  unit: requests
  aggregation: max
  dimensions:
  - client
- name: donations
  description: Optional Patreon or Ko-fi contributions supporting the service (the only money that changes hands).
  unit: USD
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Meter requests per application and per API key against the daily quota; alert well before the 1,000 or 20,000/day ceiling.
- name: Allocation
  description: Issue a separate free API key per application or team so quota consumption maps to its consumer.
- name: Optimization
  description: Cache aggressively - card and set data is nearly static and prices refresh only daily; use select to trim payloads, precise q queries to cut result pages, and pageSize=250 when bulk paging. Bulk data is also available in the open PokemonTCG/pokemon-tcg-data GitHub repo, which costs zero quota.
- name: Accountability
  description: Assign an owner for the shared quota; if the API sits in a production path, budget a recurring donation and a relationship with the maintainer for elevated limits.
maintainers:
